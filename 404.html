<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 – Page Not Found | MediCare</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="stylesheet" href="assets/css/404.css" />
  </head>
  <body class="page-404-body">
    <!-- ===== 404 SECTION ===== -->
    <section class="error-section">
      <!-- Floating background blobs -->
      <div class="err-blob err-blob--1"></div>
      <div class="err-blob err-blob--2"></div>
      <div class="err-blob err-blob--3"></div>

      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-8 col-xl-7 text-center">
            <!-- ECG / Pulse line SVG -->
            <div class="err-ecg-wrap">
              <svg
                class="err-ecg"
                viewBox="0 0 600 80"
                preserveAspectRatio="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <polyline
                  class="err-ecg-line"
                  points="0,40 60,40 90,40 110,10 130,70 150,20 170,60 190,40 260,40 290,5 310,75 330,40 600,40"
                />
              </svg>
            </div>

            <!-- 404 Number -->
            <div class="err-number-wrap">
              <span class="err-digit">4</span>
              <div class="err-pulse-icon">
                <i class="fas fa-heartbeat"></i>
              </div>
              <span class="err-digit">4</span>
            </div>

            <!-- Message -->
            <div class="err-badge">
              <i class="fas fa-stethoscope me-2"></i>Diagnosis: Page Not Found
            </div>
            <h1 class="err-title">Oops! This Page Has Gone Offline</h1>
            <p class="err-desc">
              The page you're looking for may have been moved, removed, or never
              existed. Don't worry — our team is always here to help you find
              your way back.
            </p>

            <!-- CTA Buttons -->
            <div class="err-actions">
              <a
                href="index.html"
                class="btn btn-primary btn-lg rounded-pill px-5"
              >
                <i class="fas fa-arrow-left me-2"></i>Back to Home
              </a>
              <button
                onclick="history.back()"
                class="btn btn-outline-primary btn-lg rounded-pill px-5"
              >
                <i class="fas fa-rotate-left me-2"></i>Go Back
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>
    <!-- ===== END 404 SECTION ===== -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/script.js"></script>
    <script>
      // Countdown redirect
      let seconds = 15;
      const timerEl = document.getElementById("err-timer");
      const interval = setInterval(() => {
        seconds--;
        if (timerEl) timerEl.textContent = seconds;
        if (seconds <= 0) {
          clearInterval(interval);
          window.location.href = "index.html";
        }
      }, 1000);
    </script>
  </body>
</html>
