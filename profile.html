<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile | Stackly</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/dashboard.css" />
    <link rel="stylesheet" href="assets/css/pages.css" />
  </head>
  <body>
    <aside class="db-sidebar" id="sidebar"></aside>
    <div class="db-main">
      <header class="db-topbar">
        <div class="d-flex align-items-center gap-3">
          <button
            class="topbar-icon-btn d-lg-none"
            onclick="
              document.getElementById('sidebar').classList.toggle('open')
            "
          >
            <i class="fas fa-bars"></i>
          </button>
          <div class="db-topbar-left">
            <h5>My Profile</h5>
            <p id="topbarSub">—</p>
          </div>
        </div>
        <div class="db-topbar-right">
          <div class="topbar-icon-btn">
            <i class="fas fa-magnifying-glass"></i>
          </div>
          <div class="topbar-icon-btn">
            <i class="fas fa-bell"></i><span class="dot"></span>
          </div>
          <div class="topbar-user">
            <div class="avatar" id="topbarAvatar"></div>
            <span class="uname" id="topbarName">—</span>
          </div>
        </div>
      </header>

      <main class="db-content">
        <div class="page-header-row">
          <div>
            <h4 class="page-title"><i class="fas fa-user"></i> My Profile</h4>
            <p class="page-sub">View and update your personal information</p>
          </div>
          <button class="btn-primary-action" onclick="toggleEdit()">
            <i class="fas fa-pen"></i> Edit Profile
          </button>
        </div>

        <div class="row g-4">
          <!-- Profile Card -->
          <div class="col-lg-4">
            <div class="profile-full-card">
              <div class="profile-cover"></div>
              <div class="profile-avatar-wrap">
                <div class="profile-avatar-xl" id="profileAvatarBig"></div>
                <button class="avatar-cam-btn" title="Change Photo">
                  <i class="fas fa-camera"></i>
                </button>
              </div>
              <div class="profile-full-body">
                <div class="pf-name" id="pfName">—</div>
                <div class="pf-email" id="pfEmail">—</div>
                <div class="role-badge-lg" id="pfRoleBadge">
                  <i class="fas fa-user me-1"></i><span id="pfRole">—</span>
                </div>
                <div class="pf-status">
                  <i
                    class="fas fa-circle"
                    style="color: #2e7d32; font-size: 8px"
                  ></i>
                  Active Account
                </div>
                <hr class="pf-divider" />
                <div class="pf-stat-row">
                  <div class="pf-stat">
                    <span class="pf-stat-val">12</span
                    ><span class="pf-stat-lbl">Records</span>
                  </div>
                  <div class="pf-stat">
                    <span class="pf-stat-val">3</span
                    ><span class="pf-stat-lbl">Upcoming</span>
                  </div>
                  <div class="pf-stat">
                    <span class="pf-stat-val">4</span
                    ><span class="pf-stat-lbl">Rx Active</span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Info Form -->
          <div class="col-lg-8">
            <div class="db-panel">
              <div class="db-panel-header">
                <h6>
                  <i class="fas fa-id-card me-2 text-primary"></i>Personal
                  Information
                </h6>
              </div>
              <div class="profile-form">
                <div class="form-row-2">
                  <div class="form-group">
                    <label>First Name</label>
                    <input
                      type="text"
                      class="form-input"
                      id="fFirst"
                      readonly
                    />
                  </div>
                  <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" class="form-input" id="fLast" readonly />
                  </div>
                </div>
                <div class="form-row-2">
                  <div class="form-group">
                    <label>Email Address</label>
                    <input
                      type="email"
                      class="form-input"
                      id="fEmail"
                      readonly
                    />
                  </div>
                  <div class="form-group">
                    <label>Phone Number</label>
                    <input
                      type="text"
                      class="form-input"
                      value="+91 98765 43210"
                      readonly
                    />
                  </div>
                </div>
                <div class="form-row-2">
                  <div class="form-group">
                    <label>Date of Birth</label>
                    <input
                      type="text"
                      class="form-input"
                      value="12 March 1990"
                      readonly
                    />
                  </div>
                  <div class="form-group">
                    <label>Gender</label>
                    <input
                      type="text"
                      class="form-input"
                      value="Male"
                      readonly
                    />
                  </div>
                </div>
                <div class="form-row-2">
                  <div class="form-group">
                    <label>Blood Group</label>
                    <input type="text" class="form-input" value="O+" readonly />
                  </div>
                  <div class="form-group">
                    <label>Role</label>
                    <input type="text" class="form-input" id="fRole" readonly />
                  </div>
                </div>
                <div class="form-group">
                  <label>Address</label>
                  <input
                    type="text"
                    class="form-input"
                    value="42, MG Road, Bengaluru, Karnataka – 560001"
                    readonly
                  />
                </div>
                <div class="form-group">
                  <label>Emergency Contact</label>
                  <input
                    type="text"
                    class="form-input"
                    value="Ritu Sharma (Sister) – +91 87654 32109"
                    readonly
                  />
                </div>
                <div
                  class="form-actions"
                  id="formActions"
                  style="display: none"
                >
                  <button class="btn-primary-action" onclick="saveProfile()">
                    <i class="fas fa-check"></i> Save Changes
                  </button>
                  <button class="appt-btn outline" onclick="cancelEdit()">
                    Cancel
                  </button>
                </div>
              </div>
            </div>

            <!-- Security -->
            <div class="db-panel" style="margin-top: 20px">
              <div class="db-panel-header">
                <h6><i class="fas fa-lock me-2 text-primary"></i>Security</h6>
              </div>
              <div class="profile-form">
                <div class="form-row-2">
                  <div class="form-group">
                    <label>Current Password</label>
                    <input
                      type="password"
                      class="form-input"
                      placeholder="••••••••"
                    />
                  </div>
                  <div class="form-group">
                    <label>New Password</label>
                    <input
                      type="password"
                      class="form-input"
                      placeholder="Enter new password"
                    />
                  </div>
                </div>
                <button class="btn-primary-action" style="margin-top: 8px">
                  <i class="fas fa-key"></i> Update Password
                </button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/dashboard-common.js"></script>
    <script>
      const raw = sessionStorage.getItem("user");
      if (!raw) window.location.href = "login.html";
      const user = JSON.parse(raw);

      initSidebar(user, "My Profile");
      initTopbar(user);

      const namePart = user.email
        .split("@")[0]
        .replace(/[._]/g, " ")
        .replace(/\b\w/g, (c) => c.toUpperCase());
      const parts = namePart.split(" ");
      const initials = parts
        .map((w) => w[0])
        .join("")
        .slice(0, 2);

      document.getElementById("profileAvatarBig").textContent = initials;
      document.getElementById("pfName").textContent = namePart;
      document.getElementById("pfEmail").textContent = user.email;
      document.getElementById("pfRole").textContent =
        user.role.charAt(0).toUpperCase() + user.role.slice(1);
      document.getElementById("fFirst").value = parts[0] || "";
      document.getElementById("fLast").value = parts.slice(1).join(" ") || "";
      document.getElementById("fEmail").value = user.email;
      document.getElementById("fRole").value =
        user.role.charAt(0).toUpperCase() + user.role.slice(1);

      function toggleEdit() {
        document
          .querySelectorAll(".form-input")
          .forEach((i) => i.removeAttribute("readonly"));
        document.getElementById("formActions").style.display = "flex";
      }
      function cancelEdit() {
        document
          .querySelectorAll(".form-input")
          .forEach((i) => i.setAttribute("readonly", true));
        document.getElementById("formActions").style.display = "none";
      }
      function saveProfile() {
        cancelEdit();
        alert("Profile updated successfully!");
      }
    </script>
  </body>
</html>
