<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - MediCare</title>
    <!-- Bootstrap 5 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Animate.css -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link rel="stylesheet" href="../assets/css/contact.css" />
  </head>
  <body>
    <!-- ===== HEADER ===== -->
    <div id="header-placeholder"></div>

    <!-- ===== BREADCRUMB ===== -->
    <section
      class="contact-breadcrumb"
      style="
        background-image: url(&quot;https://images.unsplash.com/photo-1584036561566-baf8f5f1b144?w=1600&q=80&quot;);
      "
    >
      <div class="contact-breadcrumb-overlay"></div>
      <div class="container">
        <div
          class="col-lg-8 offset-lg-2 text-center animate-on-scroll"
          data-animation="animate__fadeIn"
        >
          <h1>Contact Us</h1>
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb justify-content-center">
              <li class="breadcrumb-item">
                <a href="../index.html"><i class="fas fa-home me-1"></i>Home</a>
              </li>
              <li class="breadcrumb-item active" aria-current="page">
                Contact
              </li>
            </ol>
          </nav>
        </div>
      </div>
    </section>

    <!-- ===== CONTACT AREA ===== -->
    <div id="contact" class="contact-us-area section-pad">
      <div class="container">
        <div class="contact-items">
          <div class="row g-5">
            <div
              class="col-lg-7 address-box bg-cover animate-on-scroll"
              data-animation="animate__fadeInLeft"
              style="
                background-image: url(&quot;../assets/images/contact page.webp&quot;);
              "
            >
              <div class="address-info">
                <ul>
                  <li>
                    <h5><i class="fas fa-phone-alt"></i> Phone</h5>
                    <span>+44-20-7328-4499</span>
                  </li>
                  <li>
                    <h5><i class="fas fa-envelope"></i> Email</h5>
                    <span>info@healdi.com</span>
                  </li>
                </ul>
              </div>
            </div>

            <div
              class="col-lg-5 contact-form-box animate-on-scroll"
              data-animation="animate__fadeInRight"
            >
              <h2>Need help? <strong>Let's ask your questions</strong></h2>
              <form action="#" method="POST" class="contact-form">
                <div class="row g-3">
                  <div class="col-lg-12">
                    <div class="form-group">
                      <input
                        class="form-control"
                        id="name"
                        name="name"
                        placeholder="Name"
                        type="text"
                      />
                      <span class="alert-error"></span>
                    </div>
                  </div>
                  <div class="col-lg-6">
                    <div class="form-group">
                      <input
                        class="form-control"
                        id="email"
                        name="email"
                        placeholder="Email*"
                        type="email"
                      />
                      <span class="alert-error"></span>
                    </div>
                  </div>
                  <div class="col-lg-6">
                    <div class="form-group">
                      <input
                        class="form-control"
                        id="phone"
                        name="phone"
                        placeholder="Phone"
                        type="text"
                      />
                      <span class="alert-error"></span>
                    </div>
                  </div>
                  <div class="col-lg-12">
                    <div class="form-group comments">
                      <textarea
                        class="form-control"
                        id="comments"
                        name="comments"
                        placeholder="Tell Us About Project *"
                      ></textarea>
                    </div>
                  </div>
                  <div class="col-lg-12">
                    <button
                      type="submit"
                      name="submit"
                      id="submit"
                      class="btn btn-primary w-100 rounded-pill py-2 fw-semibold"
                    >
                      <i class="fas fa-paper-plane me-2"></i>Send Message
                    </button>
                  </div>
                  <!-- Alert Message -->
                  <div class="col-lg-12 alert-notification">
                    <div id="message" class="alert-msg"></div>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- ===== END CONTACT AREA ===== -->

    <!-- ===== GOOGLE MAPS ===== -->
    <div class="maps-area">
      <div class="google-maps">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m10!1m8!1m3!1d14767.262289338461!2d70.79414485000001!3d22.284975!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sin!4v1424308883981"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        ></iframe>
      </div>
    </div>
    <!-- ===== END GOOGLE MAPS ===== -->

    <!-- ===== CTA ===== -->
    <section
      class="cta-area section-pad text-center text-white animate-on-scroll"
      data-animation="animate__zoomIn"
    >
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-7">
            <h2>Need Emergency Medical Help?</h2>
            <p>
              Our emergency team is available 24/7. Don't hesitate to reach out
              — your health is our priority.
            </p>
            <div class="mt-4 d-flex flex-wrap justify-content-center gap-3">
              <a
                href="tel:+14165551234"
                class="btn btn-light btn-lg rounded-pill px-5 fw-semibold"
              >
                <i class="fas fa-phone me-2"></i>Call Now
              </a>
              <a href="#" class="btn btn-outline-light btn-lg rounded-pill px-5"
                >Book Appointment</a
              >
            </div>
          </div>
        </div>
      </div>
    </section>
    <!-- ===== END CTA ===== -->

    <!-- ===== FOOTER ===== -->
    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/script.js"></script>
  </body>
</html>
