<!doctype html>
<html lang="en">

      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />

      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"

  <body>
    <!-- ── Sidebar ── -->
    <aside class="db-sidebar" id="sidebar">
      <div class="db-sidebar-logo">
        <a
          href="index.html"
          style="
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
          "
        >
          <div class="logo-icon"><i class="fas fa-plus-circle"></i></div>
          <span>Stack<em>ly</em></span>
        </a>
      </div>

      <nav class="db-nav" id="sidebarNav">
        <!-- populated by JS -->
      </nav>

      <div class="db-sidebar-user">
        <div class="avatar" id="sidebarAvatar"></div>
        <div class="info">
          <div class="name" id="sidebarName">—</div>
          <div class="role-tag" id="sidebarRole">—</div>
        </div>
        <button class="logout-btn" title="Logout" onclick="logout()">
          <i class="fas fa-right-from-bracket"></i>
        </button>
      </div>
    </aside>

    <!-- ── Main ── -->
    <div class="db-main">
      <!-- Topbar -->
      <header class="db-topbar">
        <div class="d-flex align-items-center gap-3">
          <button
            class="topbar-icon-btn d-lg-none"
            onclick="
              document.getElementById('sidebar').classList.toggle('open')
            "
          >
            <i class="fas fa-bars"></i>
          </button>
          <div class="db-topbar-left">
            <h5 id="topbarTitle">Dashboard</h5>
            <p id="topbarSub">Welcome back!</p>
          </div>
        </div>
        <div class="db-topbar-right">
          <div class="topbar-icon-btn" title="Search">
            <i class="fas fa-magnifying-glass"></i>
          </div>
          <div class="topbar-icon-btn" title="Notifications">
            <i class="fas fa-bell"></i>
            <span class="dot"></span>
          </div>
          <div class="topbar-icon-btn" title="Messages">
            <i class="fas fa-envelope"></i>
          </div>
          <div class="topbar-user">
            <div class="avatar" id="topbarAvatar"></div>
            <span class="uname" id="topbarName">—</span>
          </div>
        </div>
      </header>

      <!-- Content -->
      <main class="db-content">
        <!-- Welcome Banner -->
        <div class="welcome-banner">
          <div class="welcome-text">
            <h2 id="welcomeHeading">Hello! 👋</h2>
            <p id="welcomeSubtext">Here's what's happening today.</p>
            <div class="welcome-meta">
              <span class="meta-chip"
                ><i class="fas fa-envelope"></i>
                <span id="wEmail">—</span></span
              >
              <span class="meta-chip"
                ><i id="wRoleIcon" class="fas fa-user"></i>
                <span id="wRole">—</span></span
              >
              <span class="meta-chip"
                ><i class="fas fa-calendar-day"></i>
                <span id="wDate">—</span></span
              >
            </div>
          </div>
          <div class="welcome-banner-icon">
            <i id="bannerIcon" class="fas fa-user-injured"></i>
          </div>
        </div>

        <!-- Stats Row -->
        <div class="stats-grid" id="statsGrid">
          <!-- populated by JS -->
        </div>

        <!-- Panels Row -->
        <div class="row g-4">
          <!-- Quick Actions -->
          <div class="col-lg-8">
            <div class="db-panel">
              <div class="db-panel-header">
                <h6>
                  <i class="fas fa-bolt me-2 text-primary"></i>Quick Actions
                </h6>
              </div>
              <div class="quick-actions" id="quickActions">
                <!-- populated by JS -->
              </div>
            </div>
          </div>

          <!-- Profile Card -->
          <div class="col-lg-4">
            <div class="profile-info-card">
              <div class="pic-header"></div>
              <div class="profile-avatar-lg" id="profileAvatar"></div>
              <div class="profile-info-body">
                <div class="pname" id="profileName">—</div>
                <div class="pemail" id="profileEmail">—</div>
                <div class="role-badge-lg">
                  <i id="profileRoleIcon" class="fas fa-user me-1"></i

                </div>
                <div class="profile-details">
                  <div class="profile-detail-row">
                    <span class="dk">Status</span>
                    <span class="dv" style="color: #2e7d32"
                      ><i class="fas fa-circle" style="font-size: 8px"></i>

                  </div>
                  <div class="profile-detail-row">

                  </div>
                  <div class="profile-detail-row">
                    <span class="dk">Role</span>

              <div class="db-panel-header">
                <h6>
                  <i class="fas fa-clock-rotate-left me-2 text-primary"></i

                </h6>
              </div>
              <div class="activity-list" id="activityList">
                <!-- populated by JS -->
              </div>
            </div>
          </div>
        </div>
      </main>
